[[people]]
id = "riccardo"
name = "Dr. Riccardo Longo"
category = "Staff" 
role = "Team Leader & Assistant Professor (RTDB - Rita Levi Montalcini's Fellow) at UniTo"
image = "img/riccardo.png"
bio = "Dr. Riccardo Longo is a heavy-ion physicist in ATLAS working on investigating the microscopic properties of the Quark Gluon Plasma (QGP) by using (di)jet probes. He is also Technical Coordinator for the ATLAS Zero Degree Calorimeter (ZDC) and Reaction Plane Detector (RPD), and plays a significant role in the upgrade of the ATLAS ZDC for the HL-LHC ( aka HL-ZDC). In June 2025, Riccardo joined Università di Torino and started leading the new heavy-ion group working on ATLAS."

